services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - STATIC_DIR=/app/dist
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - LLM_API_KEY=${LLM_API_KEY}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
